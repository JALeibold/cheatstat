{% set name = "cheatstat" %}
{% set version = "4.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/cheatstat-{{ version }}.tar.gz
  # ⚠️  SHA256 nach PyPI-Upload eintragen:
  # python -m pip download cheatstat=={{ version }} --no-deps -d /tmp
  # sha256sum /tmp/cheatstat-{{ version }}.tar.gz
  sha256: # NACH DEM UPLOAD AUF PYPI EINTRAGEN

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.8        # ← Korrigiert: war 3.9, 
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=3.8        # ← Korrigiert: war 3.9
    - pandas >=1.3
    - numpy >=1.20        # ← Korrigiert: war 1.21, 
    - scipy >=1.7

test:
  imports:
    - cheatstat
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/JALeibold/cheatstat         # ← Korrigiert: 
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Simple statistical functions for social scientists with survey weighting
  description: |
    cheatstat is a Python package for students and researchers in the
    social sciences. It simplifies basic statistical analyses with
    survey data (ALLBUS, GESIS, etc.) and provides unified survey
    weighting, intuitive recoding, and clear outputs.

    cheatstat ist ein Python-Paket für Studierende und Forschende in
    den Sozialwissenschaften. Es vereinfacht grundlegende statistische
    Analysen mit Survey-Daten (ALLBUS, GESIS u.a.) und bietet
    einheitliche Survey-Gewichtung, intuitive Umkodierung und klare
    Ausgaben.

    ⚠️  WICHTIG: Diese Implementierung ist eine Approximation für
    explorative Analysen. Für wissenschaftliche Publikationen muss
    das vollständige Survey-Design (PSU, Strata) berücksichtigt werden.
  doc_url: https://github.com/JALeibold/cheatstat/blob/main/docs/de/index.md  # ← Korrigiert
  dev_url: https://github.com/JALeibold/cheatstat                              # ← Korrigiert

extra:
  recipe-maintainers:


    - JALeibold    #

